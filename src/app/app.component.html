<div class="app-container" [class.sidebar-closed]="!sidebarOpen">
  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>
  
  <!-- Sidebar -->
  <div class="sidebar-wrapper" [class.open]="sidebarOpen">
    <app-history-sidebar></app-history-sidebar>
  </div>
  
  <!-- Main chat area -->
  <app-chat (toggleSidebar)="toggleSidebar()"></app-chat>
  <router-outlet></router-outlet>
</div>
